<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aesthetic Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a001f, #1a0033, #000000);
      font-family: 'Roboto Mono', monospace;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px 10px;
      color: white;
    }

    .calculator {
      background: rgba(20, 20, 40, 0.35);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      border-radius: 28px;
      padding: 28px 24px;
      width: 100%;
      max-width: 380px;
      box-shadow: 
        0 30px 80px rgba(0, 0, 0, 0.6),
        inset 0 2px 10px rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .display {
      background: rgba(10, 10, 30, 0.6);
      color: #f0f4ff;
      font-size: 3.4rem;
      font-weight: 300;
      text-align: right;
      padding: 32px 28px 20px;
      border-radius: 20px;
      margin-bottom: 28px;
      min-height: 110px;
      letter-spacing: -1.5px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 6px 20px rgba(0,0,0,0.5);
      overflow-wrap: break-word;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    button {
      font-size: 1.5rem;
      font-weight: 500;
      padding: 20px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px) saturate(160%);
      -webkit-backdrop-filter: blur(10px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 
        0 6px 20px rgba(0, 0, 0, 0.3),
        inset 0 1px 3px rgba(255, 255, 255, 0.12);
      color: white;
      position: relative;
      overflow: hidden;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.18);
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
    }

    button:active {
      transform: translateY(0);
      box-shadow: inset 0 4px 12px rgba(0,0,0,0.5);
    }

    button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    button:hover::before {
      opacity: 1;
    }

    /* Accents */
    .number {
      background: linear-gradient(145deg, rgba(60,60,120,0.25), rgba(40,40,80,0.25));
    }

    .operator {
      background: linear-gradient(135deg, #00bfff 0%, #0099cc 100%);
      box-shadow: 0 4px 15px rgba(0, 191, 255, 0.35);
    }

    .operator:hover {
      background: linear-gradient(135deg, #00d4ff 0%, #00aaff 100%);
      box-shadow: 0 8px 25px rgba(0, 191, 255, 0.5);
    }

    .equals {
      background: linear-gradient(135deg, #00ff9d, #00c853);
      grid-column: span 2;
      font-weight: 600;
      box-shadow: 0 6px 20px rgba(0, 200, 83, 0.4);
    }

    .equals:hover {
      background: linear-gradient(135deg, #33ffb3, #00e676);
      box-shadow: 0 10px 30px rgba(0, 200, 83, 0.55);
    }

    .clear {
      background: linear-gradient(135deg, #ff4d4d, #cc0000);
      grid-column: span 2;
      box-shadow: 0 4px 15px rgba(255, 77, 77, 0.35);
    }

    .backspace {
      background: linear-gradient(135deg, #ffc107, #ffa000);
    }

    .zero { grid-column: span 2; }

    /* Credits at bottom */
    .team-credit {
      margin-top: 40px;
      text-align: center;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.95rem;
      line-height: 1.6;
      width: 100%;
      max-width: 380px;
    }

    .credit-title {
      font-size: 1.1rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .team-inline {
      word-break: break-word;
    }

    @media (max-width: 400px) {
      .calculator { padding: 20px; }
      .display { font-size: 2.8rem; padding: 24px 20px 16px; }
      button { font-size: 1.3rem; padding: 18px; }
      .team-credit { margin-top: 32px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<div class="calculator">
  <div class="display" id="display">0</div>
  
  <div class="buttons">
    <button class="backspace" onclick="backspace()">←</button>
    <button class="operator" onclick="appendToDisplay('(')">(</button>
    <button class="operator" onclick="appendToDisplay(')')">)</button>
    <button class="operator" onclick="appendToDisplay('/')">÷</button>

    <button class="number" onclick="appendToDisplay('7')">7</button>
    <button class="number" onclick="appendToDisplay('8')">8</button>
    <button class="number" onclick="appendToDisplay('9')">9</button>
    <button class="operator" onclick="appendToDisplay('*')">×</button>

    <button class="number" onclick="appendToDisplay('4')">4</button>
    <button class="number" onclick="appendToDisplay('5')">5</button>
    <button class="number" onclick="appendToDisplay('6')">6</button>
    <button class="operator" onclick="appendToDisplay('-')">-</button>

    <button class="number" onclick="appendToDisplay('1')">1</button>
    <button class="number" onclick="appendToDisplay('2')">2</button>
    <button class="number" onclick="appendToDisplay('3')">3</button>
    <button class="operator" onclick="appendToDisplay('+')">+</button>

    <button class="number zero" onclick="appendToDisplay('0')">0</button>
    <button class="number" onclick="appendToDisplay('.')">.</button>
    <button class="clear" onclick="clearDisplay()">C</button>
    <button class="equals" onclick="calculate()">=</button>
  </div>
</div>

<div class="team-credit">
  <div class="credit-title">Developed by</div>
  <div class="team-inline">
    ABHINA B  •  ADWAITH KRISHNA G S  •  ANAGH B R  •  ARAHANTH S J  •  ASHMI JOY  •  DEVADATH B  •  DIYA RAJESH
  </div>
</div>

<script>
  const display = document.getElementById('display');

  function appendToDisplay(value) {
    if (display.innerText === '0' && value !== '.') display.innerText = value;
    else display.innerText += value;
  }

  function clearDisplay() { display.innerText = '0'; }

  function backspace() {
    if (display.innerText === 'Error' || display.innerText === '0') return display.innerText = '0';
    display.innerText = display.innerText.slice(0, -1) || '0';
  }

  function calculate() {
    try {
      let expr = display.innerText.replace(/×/g, '*').replace(/÷/g, '/');
      if (!/^[0-9.+\-*/(). ]+$/.test(expr)) return display.innerText = 'Error';
      const result = eval(expr);
      display.innerText = Number.isInteger(result) ? result : result.toFixed(8).replace(/\.?0+$/, '');
    } catch { display.innerText = 'Error'; }
  }

  document.addEventListener('keydown', e => {
    e.preventDefault();
    if (/[0-9]/.test(e.key)) appendToDisplay(e.key);
    else if (e.key === '.') appendToDisplay('.');
    else if (e.key === '+') appendToDisplay('+');
    else if (e.key === '-') appendToDisplay('-');
    else if (e.key === '*') appendToDisplay('×');
    else if (e.key === '/') appendToDisplay('÷');
    else if (e.key === '(') appendToDisplay('(');
    else if (e.key === ')') appendToDisplay(')');
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Backspace') backspace();
    else if (e.key === 'Escape' || e.key.toLowerCase() === 'c') clearDisplay();
  });
</script>

</body>
</html>
